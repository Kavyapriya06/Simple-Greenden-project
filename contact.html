<!DOCTYPE html>
<html lang="en">

<head>
    <title>contact form</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--tailwind css cdn link-->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

</head>

<body>
    <!--responsive navbar-->
    <nav class="bg-green-100 p-3 flex items-center justify-between shadow-xl sticky top-0 z-10">
        <h1 class="text-2xl">Greenden</h1>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-6 h-6 md:hidden">
            <path fill-rule="evenodd"
                d="M2 3.75A.75.75 0 0 1 2.75 3h10.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 3.75ZM2 8a.75.75 0 0 1 .75-.75h10.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 8Zm0 4.25a.75.75 0 0 1 .75-.75h10.5a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1-.75-.75Z"
                clip-rule="evenodd" />
        </svg>

        <ul class="flex gap-5 text-gray-500 hidden md:flex">
            <li>
                <a class="hover:underline hover:text-black" href="index.html">Home</a>
            </li>
            <li>
                <a class="hover:underline hover:text-black" href="product.html ">Products</a>
            </li>
            <li>
                <a class="hover:underline hover:text-black" href="contact.html">Contact</a>
            </li>
        </ul>
    </nav>

    <!-- Contact Section -->
    <section class="bg-green-100 p-8">

        <div class="text-center">
            <h1 class="text-4xl font-bold">Contact Us</h1>
            <p class="text-gray-600 mt-3">
                We'd love to hear from you! Fill out the form below and we'll get back to you as soon as possible.
            </p>
        </div>

        <div class="max-w-4xl mx-auto mt-10 bg-white shadow-xl rounded-lg p-8">

            <form>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>
                        <label class="block font-semibold mb-2">First Name</label>
                        <input type="text"
                            class="w-full border border-gray-400 rounded p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="Enter your first name">
                    </div>

                    <div>
                        <label class="block font-semibold mb-2">Last Name</label>
                        <input type="text"
                            class="w-full border border-gray-400 rounded p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="Enter your last name">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block font-semibold mb-2">Email Address</label>
                        <input type="email"
                            class="w-full border border-gray-400 rounded p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="Enter your email">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block font-semibold mb-2">Phone Number</label>
                        <input type="tel"
                            class="w-full border border-gray-400 rounded p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="Enter your phone number">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block font-semibold mb-2">Message</label>
                        <textarea rows="6"
                            class="w-full border border-gray-400 rounded p-3 focus:outline-none focus:ring-2 focus:ring-green-500"
                            placeholder="Write your message here..."></textarea>
                    </div>

                </div>

                <div class="mt-8 text-center">
                    <button class="bg-black text-white px-8 py-3 rounded hover:bg-gray-800 transition">
                        Send Message
                    </button>
                </div>

            </form>

        </div>

    </section>


    <!--footer-->

    <section class="bg-green-100 p-10 flex flex-col gap-5">
        <h2 class="text-4xl font-bold">Greenden</h2>
        <p>Inspiring greener homes with premium plants and outstanding customer care.</p>
        <p>© 2026 Greenden. All Rights Reserved.</p>

    </section>
</body>

</html>
